name: Q-BTC Genesis Auto-Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: qbtc-core-linux.tar.gz
            binary_name: quantum-btc
          - os: macos-latest
            artifact_name: qbtc-core-macos.tar.gz
            binary_name: quantum-btc
          - os: windows-latest
            artifact_name: qbtc-core-windows.zip
            binary_name: quantum-btc.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release

      - if: matrix.os != 'windows-latest'
        run: |
          cd target/release
          tar -czvf ../../${{ matrix.artifact_name }} ${{ matrix.binary_name }}

      - if: matrix.os == 'windows-latest'
        run: |
          cp Start_Mining.bat target/release/
          cd target/release
          Compress-Archive -Path ${{ matrix.binary_name }}, Start_Mining.bat -DestinationPath ../../${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
